server {
    listen 80;

    # Strip /rest/v1 prefix and proxy to PostgREST
    location /rest/v1/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
    }

    # Proxy everything else directly (e.g. /storage/v1 will fail gracefully)
    location / {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_pass_request_headers on;
    }
}
