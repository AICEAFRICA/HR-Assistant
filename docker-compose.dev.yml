version: '3.8'

services:

  # ── Local PostgreSQL with pgvector ──────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: hr-db-local
    restart: unless-stopped
    ports:
      - "5433:5432"          # 5433 on host so it won't clash with any local PG
    environment:
      POSTGRES_DB: hr_db
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: localpass123
    volumes:
      - hr-db-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hr-network-dev

  # ── PostgREST ───
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: hr-postgrest-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://hr_user:localpass123@db:5432/hr_db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: hr_user
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_SERVER_PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hr-network-dev

  # ── Nginx proxy — strips /rest/v1 prefix for supabase-py compatibility ───────
  postgrest-proxy:
    image: nginx:alpine
    container_name: hr-postgrest-proxy
    restart: unless-stopped
    volumes:
      - ./infra/nginx/postgrest.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgrest
    networks:
      - hr-network-dev

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-assistant-api-dev
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Point supabase-py at the nginx proxy (which strips /rest/v1 for PostgREST)
      - SUPABASE_URL=http://postgrest-proxy
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiaHJfdXNlciIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiZXhwIjo5OTk5OTk5OTk5fQ.cGcJWlCtRKFx0-QB2h1oSoq91TRHVCQWQRksNlVyAYw
      - SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiaHJfdXNlciIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiZXhwIjo5OTk5OTk5OTk5fQ.cGcJWlCtRKFx0-QB2h1oSoq91TRHVCQWQRksNlVyAYw
      - ENVIRONMENT=development
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      - postgrest-proxy
    networks:
      - hr-network-dev
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  # ── Streamlit frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: hr-assistant-frontend-dev
    ports:
      - "8501:8501"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=http://postgrest-proxy
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiaHJfdXNlciIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiZXhwIjo5OTk5OTk5OTk5fQ.cGcJWlCtRKFx0-QB2h1oSoq91TRHVCQWQRksNlVyAYw
      - SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiaHJfdXNlciIsImlzcyI6InN1cGFiYXNlLWxvY2FsIiwiZXhwIjo5OTk5OTk5OTk5fQ.cGcJWlCtRKFx0-QB2h1oSoq91TRHVCQWQRksNlVyAYw
    volumes:
      - .:/app
    depends_on:
      - postgrest-proxy
    networks:
      - hr-network-dev

volumes:
  hr-db-data:

networks:
  hr-network-dev:
    driver: bridge
